<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" font-family="Arial, sans-serif">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
        </marker>
        <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
        </marker>
        
        <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.2"/>
        </filter>
    </defs>

    <rect width="1000" height="800" fill="#fcfcfc" />

    <rect x="50" y="40" width="900" height="80" rx="8" fill="#4a4a4a" filter="url(#shadow)"/>
    <text x="500" y="70" fill="#ffffff" font-size="18" text-anchor="middle" font-weight="bold">ControllerAgent</text>
    <text x="500" y="95" fill="#cccccc" font-size="14" text-anchor="middle">Orquestador — lanza y supervisa todos los agentes</text>

    <rect x="50" y="180" width="220" height="70" rx="8" fill="#115e59" filter="url(#shadow)"/>
    <text x="160" y="220" fill="#ffffff" font-size="16" text-anchor="middle">ChatSimulatorAgent</text>

    <rect x="320" y="180" width="220" height="70" rx="8" fill="#115e59" filter="url(#shadow)"/>
    <text x="430" y="215" fill="#ffffff" font-size="16" text-anchor="middle">MessageFetcherAgent</text>
    <text x="430" y="235" fill="#a7f3d0" font-size="12" text-anchor="middle">* agente efímero</text>

    <rect x="580" y="180" width="370" height="385" rx="12" fill="#4c3c88" filter="url(#shadow)"/>
    <text x="765" y="215" fill="#ffffff" font-size="18" text-anchor="middle" font-weight="bold">FilterAgent</text>

    <rect x="600" y="240" width="330" height="60" rx="6" fill="#2d2d2d" filter="url(#shadow)"/>
    <text x="765" y="265" fill="#ffffff" font-size="15" text-anchor="middle" font-weight="bold">ContactManager</text>
    <text x="765" y="285" fill="#aaaaaa" font-size="12" text-anchor="middle">whitelist / blacklist de contactos</text>

    <rect x="600" y="315" width="330" height="60" rx="6" fill="#2d2d2d" filter="url(#shadow)"/>
    <text x="765" y="340" fill="#ffffff" font-size="15" text-anchor="middle" font-weight="bold">RulesEngine</text>
    <text x="765" y="360" fill="#aaaaaa" font-size="12" text-anchor="middle">reglas XML + Scoring Híbrido</text>

    <rect x="600" y="390" width="330" height="60" rx="6" fill="#2d2d2d" filter="url(#shadow)"/>
    <text x="765" y="415" fill="#ffffff" font-size="15" text-anchor="middle" font-weight="bold">LocalSentimentAnalyzer</text>
    <text x="765" y="435" fill="#aaaaaa" font-size="12" text-anchor="middle">Evaluación léxica de polaridad e intensidad</text>

    <rect x="600" y="465" width="330" height="60" rx="6" fill="#2d2d2d" filter="url(#shadow)"/>
    <text x="765" y="490" fill="#ffffff" font-size="15" text-anchor="middle" font-weight="bold">NaiveBayesClassifier</text>
    <text x="765" y="510" fill="#aaaaaa" font-size="12" text-anchor="middle">clasificador bayesiano con aprendizaje</text>

    <rect x="580" y="700" width="170" height="70" rx="8" fill="#78350f" filter="url(#shadow)"/>
    <text x="665" y="740" fill="#ffffff" font-size="16" text-anchor="middle">UIAgent</text>

    <rect x="780" y="700" width="170" height="70" rx="8" fill="#713f12" filter="url(#shadow)"/>
    <text x="865" y="740" fill="#ffffff" font-size="16" text-anchor="middle">StatsAgent</text>

    <line x1="160" y1="120" x2="160" y2="175" stroke="#888" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
    <text x="170" y="150" fill="#888" font-size="12">crea</text>

    <line x1="765" y1="120" x2="765" y2="175" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="775" y="150" fill="#888" font-size="12">INFORM (START/STOP)</text>

    <line x1="270" y1="215" x2="315" y2="215" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

    <line x1="540" y1="215" x2="575" y2="215" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="560" y="205" fill="#888" font-size="12" text-anchor="middle">ChatMessage</text>

    <line x1="665" y1="565" x2="665" y2="695" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="675" y="615" fill="#888" font-size="11">aprobado /</text>
    <text x="675" y="630" fill="#888" font-size="11">discarded-batch (ordenado)</text>

    <line x1="865" y1="565" x2="865" y2="695" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="875" y="620" fill="#888" font-size="12">FilterEvent</text>

    <path d="M 580 735 L 530 735 L 530 500 L 575 500" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)"/>
    <text x="520" y="615" fill="#888" font-size="11" text-anchor="end">classify</text>
    <text x="520" y="630" fill="#888" font-size="11" text-anchor="end">request / response</text>

</svg>
